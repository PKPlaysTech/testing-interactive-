<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invictus Magic Forest - Full System</title>
    
    <!-- 引入外部库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        /* 这里包含了你需要的全套 CSS */
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        #defaultCanvas0 { position: absolute; z-index: 1; top: 0; left: 0; }
        #three-canvas { position: absolute; z-index: 2; top: 0; left: 0; pointer-events: none; transition: opacity 1.5s ease-in-out; }
        #input-video { display: none; }

        #ui-container {
            position: absolute; left: 40px; top: 50%; transform: translateY(-50%);
            display: none; flex-direction: column; gap: 15px; z-index: 100;
            opacity: 0; transition: opacity 2s ease-in-out;
        }
        
        .menu-btn {
            padding: 16px 20px; width: 190px; background: rgba(0, 20, 30, 0.7);
            backdrop-filter: blur(10px); color: #00f2ff; border: 2px solid rgba(0, 242, 255, 0.3);
            border-radius: 15px; font-size: 18px; font-weight: 800; text-align: left;
            cursor: pointer; text-transform: uppercase; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .menu-btn.active, .menu-btn:hover {
            background: #00f2ff; color: #000; transform: scale(1.1) translateX(15px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.6);
        }
        
        .clear-btn { margin-top: 30px; border-color: #ff4444; color: #ff4444; background: rgba(40, 0, 0, 0.6); }
        .clear-btn:hover { background: #ff4444; color: #fff; }
    </style>
</head>
<body>

    <!-- UI 菜单 -->
    <div id="ui-container">
        <button id="btn-grass" class="menu-btn" onclick="setMode('grass')">🌱 GRASS</button>
        <button id="btn-flower" class="menu-btn active" onclick="setMode('flower')">🌸 FLOWER</button>
        <button id="btn-rose" class="menu-btn" onclick="setMode('rose')">🌹 ROSE</button>
        <button id="btn-vine" class="menu-btn" onclick="setMode('vine')">🌿 VINE</button>
        <button id="btn-butterfly" class="menu-btn" onclick="setMode('butterfly')">🦋 BUTTERFLY</button>
        <button id="btn-star" class="menu-btn" onclick="setMode('star')">✨ STAR</button>
        <button id="btn-firefly" class="menu-btn" onclick="setMode('firefly')">💡 FIREFLY</button>
        <button class="menu-btn clear-btn" onclick="clearCanvas()">♻️ RESET</button>
    </div>

    <video id="input-video"></video>
    <canvas id="three-canvas"></canvas>

    <script>
        /**
         * PART 1: CountdownManager (Three.js 粒子引擎)
         */
        const CountdownManager = {
            scene: null, camera: null, renderer: null, particles: null,
            targetPositions: null, pointsData: {}, particleCount: 45000,
            
            init() {
                const canvas = document.getElementById('three-canvas');
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.z = 12;
                this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);

                // 文字采样
                this.pointsData['welcome'] = this.generateTextPoints(["WELCOME TO", "INVICTUS"], 110);
                this.pointsData['3'] = this.generateTextPoints("3", 150);
                this.pointsData['2'] = this.generateTextPoints("2", 150);
                this.pointsData['1'] = this.generateTextPoints("1", 150);

                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(this.particleCount * 3);
                this.targetPositions = new Float32Array(this.particleCount * 3);

                for (let i = 0; i < this.particleCount; i++) {
                    positions[i*3] = (Math.random()-0.5)*40;
                    positions[i*3+1] = (Math.random()-0.5)*30;
                    positions[i*3+2] = (Math.random()-0.5)*20;
                    this.setTarget(i, 'welcome');
                }
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                this.particles = new THREE.Points(geometry, new THREE.PointsMaterial({
                    color: 0x00f2ff, size: 0.04, transparent: true, blending: THREE.AdditiveBlending
                }));
                this.scene.add(this.particles);
            },

            generateTextPoints(lines, fontSize) {
                const c = document.createElement('canvas'); const ctx = c.getContext('2d');
                c.width = 1200; c.height = 800;
                ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 1200, 800);
                ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                if (Array.isArray(lines)) {
                    ctx.font = `900 ${fontSize}px sans-serif`;
                    lines.forEach((l, i) => ctx.fillText(l, 600, 400 + (i - (lines.length-1)/2) * (fontSize * 1.2)));
                } else {
                    ctx.font = `900 ${fontSize * 3}px sans-serif`; ctx.fillText(lines, 600, 400);
                }
                const data = ctx.getImageData(0, 0, 1200, 800).data;
                const pts = [];
                for (let y = 0; y < 800; y += 3) {
                    for (let x = 0; x < 1200; x += 3) {
                        if (data[(y * 1200 + x) * 4] > 150) pts.push({ x: (x-600)*0.02, y: (400-y)*0.02 });
                    }
                }
                return pts;
            },

            setTarget(i, key) {
                const pts = this.pointsData[key];
                const p = pts[i % pts.length];
                this.targetPositions[i*3] = p.x;
                this.targetPositions[i*3+1] = p.y;
                this.targetPositions[i*3+2] = (Math.random()-0.5)*0.5;
            },

            updateTargets(key) {
                for (let i = 0; i < this.particleCount; i++) this.setTarget(i, key);
            },

            render(mode) {
                const pos = this.particles.geometry.attributes.position.array;
                for (let i = 0; i < this.particleCount; i++) {
                    const i3 = i*3;
                    const spd = (mode === 'float') ? 0.01 : 0.1;
                    pos[i3] += (this.targetPositions[i3] - pos[i3]) * spd + (mode === 'float' ? Math.sin(Date.now()*0.001+i)*0.01 : 0);
                    pos[i3+1] += (this.targetPositions[i3+1] - pos[i3+1]) * spd + (mode === 'float' ? Math.cos(Date.now()*0.001+i)*0.01 : 0);
                    pos[i3+2] += (this.targetPositions[i3+2] - pos[i3+2]) * spd;
                }
                this.particles.geometry.attributes.position.needsUpdate = true;
                this.renderer.render(this.scene, this.camera);
            }
        };

        /**
         * PART 2: Mediapipe & State Management
         */
        let handData = [];
        let appState = "COUNTDOWN"; 
        let countdownValue = "welcome";

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults((results) => { handData = results.multiHandLandmarks; });

        const videoElement = document.getElementById('input-video');
        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 1280, height: 720
        });
        camera.start();

        function triggerForestEntry() {
            setTimeout(() => {
                document.getElementById('three-canvas').style.opacity = '0';
                const ui = document.getElementById('ui-container');
                ui.style.display = 'flex';
                setTimeout(() => { ui.style.opacity = '1'; appState = "FOREST"; }, 100);
            }, 1500);
        }
    </script>
    
    <!-- 引入你的 sketch.js -->
    <script src="sketch.js"></script>

    <script>
        /**
         * PART 3: 引擎调度器
         */
        const oldSetup = setup;
        setup = function() {
            if(typeof oldSetup === 'function') oldSetup();
            CountdownManager.init();
        };

        const oldDraw = draw;
        draw = function() {
            if (appState === "FOREST") {
                if(typeof originalDraw === 'function') originalDraw();
            } else {
                background(0);
                if (handData && handData.length > 0) {
                    const hand = handData[0];
                    let f = 0;
                    if (hand[8].y < hand[6].y) f++;
                    if (hand[12].y < hand[10].y) f++;
                    if (hand[16].y < hand[14].y) f++;
                    
                    let next = countdownValue;
                    if (f === 3) next = '3';
                    else if (f === 2 && countdownValue === '3') next = '2';
                    else if (f === 1 && countdownValue === '2') {
                        next = '1';
                        if (countdownValue !== '1') triggerForestEntry();
                    }
                    if (next !== countdownValue) {
                        countdownValue = next;
                        CountdownManager.updateTargets(next);
                    }
                }
                CountdownManager.render(countdownValue === 'welcome' ? 'float' : 'target');
            }
        };
    </script>
</body>
</html>
